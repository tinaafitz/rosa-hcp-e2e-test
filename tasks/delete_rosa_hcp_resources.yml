---
# ================================================================
# Delete ROSA HCP Resources Task File
# ================================================================
# This task file handles the deletion of ROSA HCP cluster resources
# in the correct order with proper error handling and waiting.
# ================================================================

- name: Set agent monitor log file for real-time monitoring
  set_fact:
    agent_monitor_log: "/tmp/deletion-agent-{{ cluster_name }}.log"

- name: Initialize agent monitor log file
  copy:
    content: ""
    dest: "{{ agent_monitor_log }}"
    force: true

- name: Check if Cluster exists
  shell: |
    oc get cluster {{ cluster_name }} -n {{ capi_namespace }} -o name 2>/dev/null || echo "not-found"
  register: cluster_exists
  changed_when: false

- name: Check if ROSAControlPlane exists
  shell: |
    oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }} -o name 2>/dev/null || echo "not-found"
  register: rcp_exists
  changed_when: false

- name: Check if ROSAMachinePool exists
  shell: |
    oc get rosamachinepool {{ machine_pool_name }} -n {{ capi_namespace }} -o name 2>/dev/null || echo "not-found"
  register: rmp_exists
  changed_when: false

- name: Check if ROSANetwork exists
  shell: |
    oc get rosanetwork {{ rosa_network_name }} -n {{ capi_namespace }} -o name 2>/dev/null || echo "not-found"
  register: rn_exists
  changed_when: false

- name: Check if ROSARoleConfig exists
  shell: |
    oc get rosaroleconfig {{ rosa_role_config_name }} -n {{ capi_namespace }} -o name 2>/dev/null || echo "not-found"
  register: rrc_exists
  changed_when: false

- name: Display resource status
  debug:
    msg: |
      Current Resource Status:
      • Cluster: {{ 'Found' if 'not-found' not in cluster_exists.stdout else 'Not Found' }}
      • ROSAControlPlane: {{ 'Found' if 'not-found' not in rcp_exists.stdout else 'Not Found' }}
      • ROSAMachinePool: {{ 'Found' if 'not-found' not in rmp_exists.stdout else 'Not Found' }}
      • ROSANetwork: {{ 'Found' if 'not-found' not in rn_exists.stdout else 'Not Found' }}
      • ROSARoleConfig: {{ 'Found' if 'not-found' not in rrc_exists.stdout else 'Not Found' }}

- name: Build list of resources to delete
  set_fact:
    resources_to_delete: []

- name: Add cluster to deletion list (if exists)
  set_fact:
    resources_to_delete: "{{ resources_to_delete + ['cluster/' + cluster_name] }}"
  when: "'not-found' not in cluster_exists.stdout"

- name: Add ROSAControlPlane to deletion list (if exists)
  set_fact:
    resources_to_delete: "{{ resources_to_delete + ['rosacontrolplane/' + cluster_name] }}"
  when: "'not-found' not in rcp_exists.stdout"

- name: Display resources to be deleted
  debug:
    msg: |
      Resources to delete:
      {{ resources_to_delete | join('\n      ') }}
  when: resources_to_delete | length > 0

- name: Delete all ROSA resources with single oc delete command
  shell: |
    oc delete -n {{ capi_namespace }} {{ resources_to_delete | join(' ') }} --wait=false
  register: delete_all
  when: resources_to_delete | length > 0

- name: Show deletion status
  debug:
    msg: "✓ Deletion initiated for {{ resources_to_delete | length }} resource(s)"
  when:
    - resources_to_delete | length > 0
    - delete_all.rc == 0

- name: No resources to delete
  debug:
    msg: "ℹ️  No matching resources found to delete"
  when: resources_to_delete | length == 0

- name: Emit agent context for ROSAControlPlane deletion wait
  shell: |
    echo "#AGENT_CONTEXT: resource_name={{ cluster_name }} namespace={{ capi_namespace }} resource_type=rosacontrolplane" | tee -a "{{ agent_monitor_log }}"
  changed_when: false
  when:
    - wait_for_deletion | bool
    - "'not-found' not in rcp_exists.stdout"

- name: Wait for ROSAControlPlane deletion to complete
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    RETRIES={{ (rosacontrolplane_timeout | default(deletion_timeout) | int / 10) | int }}
    for i in $(seq 1 $RETRIES); do
      OUTPUT=$(oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }} 2>&1)
      RC=$?
      if [ $RC -ne 0 ]; then
        if echo "$OUTPUT" | grep -qi "not found\|NotFound\|no resources found"; then
          echo "ROSAControlPlane deleted successfully" | tee -a "$LOGFILE"
          exit 0
        fi
        echo "WARNING: oc get failed unexpectedly (rc=$RC): $OUTPUT" | tee -a "$LOGFILE"
      fi
      echo "FAILED - RETRYING: [localhost]: Wait for rosacontrolplane {{ cluster_name }} deletion to complete ($((RETRIES - i)) retries left)." | tee -a "$LOGFILE"
      sleep 10
    done
    echo "Timed out waiting for ROSAControlPlane deletion" | tee -a "$LOGFILE"
    exit 1
  register: wait_rcp
  failed_when: false
  when:
    - wait_for_deletion | bool
    - "'not-found' not in rcp_exists.stdout"

- name: Final check - verify ROSAControlPlane is actually gone
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    for i in $(seq 1 18); do
      OUTPUT=$(oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }} 2>&1)
      RC=$?
      if [ $RC -ne 0 ]; then
        if echo "$OUTPUT" | grep -qi "not found\|NotFound\|no resources found"; then
          echo "ROSAControlPlane confirmed deleted" | tee -a "$LOGFILE"
          exit 0
        fi
        echo "WARNING: oc get failed unexpectedly (rc=$RC): $OUTPUT" | tee -a "$LOGFILE"
      fi
      echo "FAILED - RETRYING: [localhost]: Final check rosacontrolplane {{ cluster_name }} deletion ($((18 - i)) retries left)." | tee -a "$LOGFILE"
      sleep 10
    done
    echo "ROSAControlPlane still exists after final check" | tee -a "$LOGFILE"
    exit 1
  register: final_rcp_check
  failed_when: false
  changed_when: false
  when:
    - wait_for_deletion | bool
    - "'not-found' not in rcp_exists.stdout"
    - wait_rcp.rc != 0

- name: Display ROSAControlPlane deletion result
  debug:
    msg: |
      {% if wait_rcp.rc == 0 or (final_rcp_check.rc | default(1)) == 0 %}
      ✅ ROSAControlPlane successfully deleted: {{ cluster_name }}
      {% else %}
      ⚠️  ROSAControlPlane still exists (may still be deleting): {{ cluster_name }}
      Check status: oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }}
      {% endif %}
  when:
    - wait_for_deletion | bool
    - "'not-found' not in rcp_exists.stdout"

- name: Warn if ROSAControlPlane still exists after all retries
  set_fact:
    rcp_deletion_failed: true
  when:
    - wait_for_deletion | bool
    - "'not-found' not in rcp_exists.stdout"
    - wait_rcp.rc != 0
    - (final_rcp_check.rc | default(1)) != 0

- name: Display ROSAControlPlane timeout warning
  debug:
    msg: |
      ⚠️  ROSAControlPlane {{ cluster_name }} still exists after timeout.
      Continuing with remaining resource cleanup...
      Check: oc get rosacontrolplane {{ cluster_name }} -n {{ capi_namespace }}
  when: rcp_deletion_failed | default(false) | bool

- name: Delete ROSANetwork (after ROSAControlPlane deletion completes)
  shell: |
    oc delete rosanetwork {{ rosa_network_name }} -n {{ capi_namespace }} --wait=false
  register: delete_rn
  failed_when: false
  when:
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"

- name: Delete ROSARoleConfig (after ROSAControlPlane deletion completes)
  shell: |
    oc delete rosaroleconfig {{ rosa_role_config_name }} -n {{ capi_namespace }} --wait=false
  register: delete_rrc
  failed_when: false
  when:
    - delete_roles | bool
    - "'not-found' not in rrc_exists.stdout"

- name: Delete ManagedCluster (if exists)
  shell: |
    oc delete managedcluster {{ cluster_name }} --wait=false
  register: delete_mc
  failed_when: false
  ignore_errors: true
  when: true

- name: Emit agent context for ROSANetwork deletion wait
  shell: |
    echo "#AGENT_CONTEXT: resource_name={{ rosa_network_name }} namespace={{ capi_namespace }} resource_type=rosanetwork" | tee -a "{{ agent_monitor_log }}"
  changed_when: false
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"

- name: Wait for ROSANetwork deletion to complete
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    RETRIES={{ (rosanetwork_timeout | default(deletion_timeout) | int / 10) | int }}
    for i in $(seq 1 $RETRIES); do
      OUTPUT=$(oc get rosanetwork {{ rosa_network_name }} -n {{ capi_namespace }} 2>&1)
      RC=$?
      if [ $RC -ne 0 ]; then
        if echo "$OUTPUT" | grep -qi "not found\|NotFound\|no resources found"; then
          echo "ROSANetwork deleted successfully" | tee -a "$LOGFILE"
          exit 0
        fi
        echo "WARNING: oc get failed unexpectedly (rc=$RC): $OUTPUT" | tee -a "$LOGFILE"
      fi
      echo "FAILED - RETRYING: [localhost]: Wait for rosanetwork {{ rosa_network_name }} deletion to complete ($((RETRIES - i)) retries left)." | tee -a "$LOGFILE"
      sleep 10
    done
    echo "Timed out waiting for ROSANetwork deletion" | tee -a "$LOGFILE"
    exit 1
  register: wait_rn
  failed_when: false
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"

- name: Final check - verify ROSANetwork is actually gone
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    for i in $(seq 1 36); do
      OUTPUT=$(oc get rosanetwork {{ rosa_network_name }} -n {{ capi_namespace }} 2>&1)
      RC=$?
      if [ $RC -ne 0 ]; then
        if echo "$OUTPUT" | grep -qi "not found\|NotFound\|no resources found"; then
          echo "ROSANetwork confirmed deleted" | tee -a "$LOGFILE"
          exit 0
        fi
        echo "WARNING: oc get failed unexpectedly (rc=$RC): $OUTPUT" | tee -a "$LOGFILE"
      fi
      echo "FAILED - RETRYING: [localhost]: Final check rosanetwork {{ rosa_network_name }} deletion ($((36 - i)) retries left)." | tee -a "$LOGFILE"
      sleep 10
    done
    echo "ROSANetwork still exists after final check" | tee -a "$LOGFILE"
    exit 1
  register: final_rn_check
  failed_when: false
  changed_when: false
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"
    - wait_rn.rc != 0

- name: Display ROSANetwork deletion result
  debug:
    msg: |
      {% if wait_rn.rc == 0 or (final_rn_check.rc | default(1)) == 0 %}
      ✅ ROSANetwork successfully deleted: {{ rosa_network_name }}
      {% else %}
      ⚠️  ROSANetwork still exists (CloudFormation stack may still be deleting)
      Check status: oc get rosanetwork {{ rosa_network_name }} -n {{ capi_namespace }}
      {% endif %}
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"

- name: Warn if ROSANetwork still exists after all retries
  set_fact:
    rosanetwork_deletion_failed: true
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"
    - wait_rn.rc != 0
    - (final_rn_check.rc | default(1)) != 0

- name: Display ROSANetwork timeout warning
  debug:
    msg: |
      ⚠️  ROSANetwork {{ rosa_network_name }} still exists after timeout.
      Continuing with remaining resource cleanup...
      CloudFormation stack may need manual cleanup.
      Check: aws cloudformation describe-stacks --stack-name {{ cluster_name }}-rosa-network-stack
  when: rosanetwork_deletion_failed | default(false) | bool

# ================================================================
# Post-deletion CloudFormation stack verification
# ================================================================
# After the K8s ROSANetwork resource is gone, the underlying AWS
# CloudFormation stack may still be DELETE_IN_PROGRESS or DELETE_FAILED.
# ROSA creates security groups (e.g. *-vpce-private-router) outside
# CloudFormation, which block VPC deletion and cause DELETE_FAILED.
# This step catches orphaned stacks that would otherwise cost money.
# ================================================================

- name: Emit agent context for CloudFormation verification
  shell: |
    echo "#AGENT_CONTEXT: resource_name={{ rosa_network_name }} namespace={{ capi_namespace }} resource_type=rosanetwork" | tee -a "{{ agent_monitor_log }}"
  changed_when: false
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"

- name: Verify CloudFormation stack cleanup after ROSANetwork deletion
  environment:
    AWS_ACCESS_KEY_ID: "{{ AWS_ACCESS_KEY_ID | default(omit) }}"
    AWS_SECRET_ACCESS_KEY: "{{ AWS_SECRET_ACCESS_KEY | default(omit) }}"
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    STACK_NAME="{{ cluster_name }}-rosa-network-stack"
    REGION="{{ aws_region | default('us-west-2') }}"
    NETWORK_NAME="{{ rosa_network_name }}"
    NAMESPACE="{{ capi_namespace }}"
    RETRIES=36
    echo "Verifying CloudFormation stack $STACK_NAME cleanup..." | tee -a "$LOGFILE"
    for i in $(seq 1 $RETRIES); do
      # Try K8s resource status first (works without aws CLI)
      K8S_STATUS=$(oc get rosanetwork "$NETWORK_NAME" -n "$NAMESPACE" -o jsonpath='{.status.stackStatus}' 2>/dev/null)
      if [ -n "$K8S_STATUS" ]; then
        STATUS="$K8S_STATUS"
      else
        # K8s resource gone — try aws CLI as fallback
        STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$REGION" --query 'Stacks[0].StackStatus' --output text 2>&1)
        RC=$?
        if [ $RC -ne 0 ]; then
          if echo "$STATUS" | grep -qi "does not exist"; then
            echo "CloudFormation stack $STACK_NAME confirmed deleted" | tee -a "$LOGFILE"
            exit 0
          fi
          # aws CLI may not be available — skip verification
          if echo "$STATUS" | grep -qi "command not found\|No such file"; then
            echo "WARNING: aws CLI not available and K8s resource gone — cannot verify CloudFormation cleanup" | tee -a "$LOGFILE"
            echo "Check manually: aws cloudformation describe-stacks --stack-name $STACK_NAME --region $REGION" | tee -a "$LOGFILE"
            exit 1
          fi
          echo "WARNING: aws cloudformation check failed (rc=$RC): $STATUS" | tee -a "$LOGFILE"
        fi
      fi
      if [ "$STATUS" = "DELETE_COMPLETE" ]; then
        echo "CloudFormation stack $STACK_NAME confirmed deleted" | tee -a "$LOGFILE"
        exit 0
      fi
      if [ "$STATUS" = "DELETE_FAILED" ]; then
        echo "CloudFormation stack DELETE_FAILED: $STACK_NAME — orphaned AWS resources detected" | tee -a "$LOGFILE"
        echo "FAILED - RETRYING: [localhost]: Wait for cloudformation $STACK_NAME deletion to complete ($((RETRIES - i)) retries left)." | tee -a "$LOGFILE"
        sleep 10
        continue
      fi
      echo "FAILED - RETRYING: [localhost]: Wait for cloudformation $STACK_NAME deletion to complete ($((RETRIES - i)) retries left). Status: $STATUS" | tee -a "$LOGFILE"
      sleep 10
    done
    echo "WARNING: CloudFormation stack $STACK_NAME not confirmed deleted after verification" | tee -a "$LOGFILE"
    exit 1
  register: cfn_verify
  failed_when: false
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"

- name: Display CloudFormation verification result
  debug:
    msg: |
      {% if cfn_verify.rc == 0 %}
      ✅ CloudFormation stack {{ cluster_name }}-rosa-network-stack confirmed deleted
      {% else %}
      ⚠️  CloudFormation stack {{ cluster_name }}-rosa-network-stack may have orphaned resources
      Check: aws cloudformation describe-stacks --stack-name {{ cluster_name }}-rosa-network-stack --region {{ aws_region | default('us-west-2') }}
      {% endif %}
  when:
    - wait_for_deletion | bool
    - delete_network | bool
    - "'not-found' not in rn_exists.stdout"
    - cfn_verify is defined

- name: Emit agent context for ROSARoleConfig deletion wait
  shell: |
    echo "#AGENT_CONTEXT: resource_name={{ rosa_role_config_name }} namespace={{ capi_namespace }} resource_type=rosaroleconfig" | tee -a "{{ agent_monitor_log }}"
  changed_when: false
  when:
    - wait_for_deletion | bool
    - delete_roles | bool
    - "'not-found' not in rrc_exists.stdout"

- name: Wait for ROSARoleConfig deletion to complete
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    RETRIES={{ (rosaroleconfig_timeout | default(deletion_timeout) | int / 10) | int }}
    for i in $(seq 1 $RETRIES); do
      OUTPUT=$(oc get rosaroleconfig {{ rosa_role_config_name }} -n {{ capi_namespace }} 2>&1)
      RC=$?
      if [ $RC -ne 0 ]; then
        if echo "$OUTPUT" | grep -qi "not found\|NotFound\|no resources found"; then
          echo "ROSARoleConfig deleted successfully" | tee -a "$LOGFILE"
          exit 0
        fi
        echo "WARNING: oc get failed unexpectedly (rc=$RC): $OUTPUT" | tee -a "$LOGFILE"
      fi
      echo "FAILED - RETRYING: [localhost]: Wait for rosaroleconfig {{ rosa_role_config_name }} deletion to complete ($((RETRIES - i)) retries left)." | tee -a "$LOGFILE"
      sleep 10
    done
    echo "Timed out waiting for ROSARoleConfig deletion" | tee -a "$LOGFILE"
    exit 1
  register: wait_rrc
  failed_when: false
  when:
    - wait_for_deletion | bool
    - delete_roles | bool
    - "'not-found' not in rrc_exists.stdout"

- name: Final check - verify ROSARoleConfig is actually gone
  shell: |
    LOGFILE="{{ agent_monitor_log }}"
    for i in $(seq 1 18); do
      OUTPUT=$(oc get rosaroleconfig {{ rosa_role_config_name }} -n {{ capi_namespace }} 2>&1)
      RC=$?
      if [ $RC -ne 0 ]; then
        if echo "$OUTPUT" | grep -qi "not found\|NotFound\|no resources found"; then
          echo "ROSARoleConfig confirmed deleted" | tee -a "$LOGFILE"
          exit 0
        fi
        echo "WARNING: oc get failed unexpectedly (rc=$RC): $OUTPUT" | tee -a "$LOGFILE"
      fi
      echo "FAILED - RETRYING: [localhost]: Final check rosaroleconfig {{ rosa_role_config_name }} deletion ($((18 - i)) retries left)." | tee -a "$LOGFILE"
      sleep 10
    done
    echo "ROSARoleConfig still exists after final check" | tee -a "$LOGFILE"
    exit 1
  register: final_rrc_check
  failed_when: false
  changed_when: false
  when:
    - wait_for_deletion | bool
    - delete_roles | bool
    - "'not-found' not in rrc_exists.stdout"
    - wait_rrc.rc != 0

- name: Display ROSARoleConfig deletion result
  debug:
    msg: |
      {% if wait_rrc.rc == 0 or (final_rrc_check.rc | default(1)) == 0 %}
      ✅ ROSARoleConfig successfully deleted: {{ rosa_role_config_name }}
      {% else %}
      ⚠️  ROSARoleConfig still exists (IAM roles may still be deleting)
      Check status: oc get rosaroleconfig {{ rosa_role_config_name }} -n {{ capi_namespace }}
      {% endif %}
  when:
    - wait_for_deletion | bool
    - delete_roles | bool
    - "'not-found' not in rrc_exists.stdout"

- name: Set deletion summary
  set_fact:
    deletion_summary: |
      {% if 'not-found' not in cluster_exists.stdout %}
      • Core Cluster: {{ '✅ Deleted' if delete_all is defined and delete_all.rc == 0 else '⏳ Deletion initiated' }}
      {% endif %}
      {% if 'not-found' not in rcp_exists.stdout %}
      • ROSAControlPlane: {{ '✅ Deleted' if (wait_for_deletion and (wait_rcp.rc == 0 or (final_rcp_check.rc | default(1)) == 0)) else '⏳ Deletion initiated' }}
      {% endif %}
      {% if 'not-found' not in rmp_exists.stdout %}
      • ROSAMachinePool: ✅ Auto-deleted (cascade)
      {% endif %}
      {% if delete_network | bool and 'not-found' not in rn_exists.stdout %}
      • ROSANetwork: {{ '✅ Deleted' if (wait_for_deletion and (wait_rn.rc == 0 or (final_rn_check.rc | default(1)) == 0)) else '⏳ Deletion initiated' }}
      {% endif %}
      {% if delete_roles | bool and 'not-found' not in rrc_exists.stdout %}
      • ROSARoleConfig: {{ '✅ Deleted' if (wait_for_deletion and (wait_rrc.rc == 0 or (final_rrc_check.rc | default(1)) == 0)) else '⏳ Deletion initiated' }}
      {% endif %}

- name: Display deletion summary
  debug:
    msg: |

      Deletion Summary:
      {{ deletion_summary }}

- name: Fail if any resource deletion timed out
  fail:
    msg: |
      One or more resources failed to delete within the timeout period.
      {{ '⚠️  ROSAControlPlane timed out' if (rcp_deletion_failed | default(false)) else '' }}
      {{ '⚠️  ROSANetwork timed out' if (rosanetwork_deletion_failed | default(false)) else '' }}
  when: (rcp_deletion_failed | default(false)) or (rosanetwork_deletion_failed | default(false))
